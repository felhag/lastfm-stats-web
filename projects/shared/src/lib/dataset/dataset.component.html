<div class="root">
  <mat-card appearance="outlined">
    <mat-card-content>
      <div class="full-width search-fields">
        <app-search-field label="Search artist" [(value)]="filterArtist" />
        @if ((groupedBy | async) !== 'artist') {
          <app-search-field label="Search {{groupedBy | async}}" [(value)]="filterName" />
        }
      </div>
      <div class="button-bar">
        <mat-radio-group [value]="groupedBy | async" (change)="groupBy($event)">
          <mat-radio-button value="artist">Artist</mat-radio-button>
          <mat-radio-button value="album">Album</mat-radio-button>
          <mat-radio-button value="track">Track</mat-radio-button>
        </mat-radio-group>

        <button mat-icon-button matTooltip="Download" (click)="download()"><mat-icon>download</mat-icon></button>
      </div>
    </mat-card-content>
  </mat-card>
  <div class="header-wrapper">
    <table mat-table matSort matSortActive="rank" matSortDirection="asc" [dataSource]="[]" [fixedLayout]="true" class="full-width header-table">
      @for (col of columns; track col) {
        <ng-container [matColumnDef]="col">
          <th mat-header-cell *matHeaderCellDef [mat-sort-header]="col">{{getHeader(col) | titlecase}}</th>
          <td mat-cell *matCellDef="let element"></td>
        </ng-container>
      }
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns;"></tr>
    </table>
  </div>
  @if (showViewport) {
    <cdk-virtual-scroll-viewport [itemSize]="52" [minBufferPx]="400" [maxBufferPx]="1200">
      <table mat-table [dataSource]="dataSource" [trackBy]="trackBy" [fixedLayout]="true" class="full-width body-table">
        @for (col of columns; track col) {
          <ng-container [matColumnDef]="col">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let element"> {{element[col]}} </td>
          </ng-container>
        }
        <tr mat-row *matRowDef="let row; columns: columns;" (click)="open(row)"></tr>
      </table>
    </cdk-virtual-scroll-viewport>
  }
</div>
